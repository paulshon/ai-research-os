version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_research_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── FastAPI Backend ──
  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infrastructure/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_research_os
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Realtime (Hocuspocus) ──
  realtime:
    build:
      context: ../../apps/realtime
      dockerfile: ../../infrastructure/docker/realtime.Dockerfile
    ports:
      - "1234:1234"
    environment:
      REALTIME_PORT: 1234

volumes:
  postgres_data:
  redis_data:

name: Web CI/CD

on:
  push:
    branches: [main]
    paths: ["apps/web/**", "packages/**"]
  pull_request:
    branches: [main]
    paths: ["apps/web/**", "packages/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter=@ai-research-os/web
      - run: pnpm turbo lint --filter=@ai-research-os/web
      - run: pnpm turbo typecheck --filter=@ai-research-os/web

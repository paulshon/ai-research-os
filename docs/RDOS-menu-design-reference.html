<html lang="ko">
<head>

<title>RDOS — AI Research OS</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090c10;color:#e2e8f0;font-family:'Noto Sans KR',sans-serif;font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.app{display:flex;min-height:100vh}
.sidebar{width:180px;background:#0d1117;border-right:1px solid #1e293b;display:flex;flex-direction:column;padding:16px 0;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:8px 16px 16px;border-bottom:1px solid #1e293b;margin-bottom:8px}
.sidebar-logo-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px}
.sidebar-logo-sub{font-size:11px;color:#64748b;margin-top:2px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 12px;margin:1px 8px;border-radius:6px;cursor:pointer;color:#94a3b8;font-size:13px;transition:all .15s;position:relative}
.sidebar-item:hover{background:#1e293b;color:#e2e8f0}
.sidebar-item.active{background:#1e293b;color:#e2e8f0}
.sidebar-item.active::after{content:'•';position:absolute;right:10px;color:#10b981;font-size:16px}
.sidebar-icon{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.main{flex:1;overflow:auto}
.page{padding:32px 40px;max-width:1100px}
.back-link{font-size:12px;color:#64748b;margin-bottom:20px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.back-link:hover{color:#94a3b8}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.page-title-row{display:flex;align-items:center;gap:12px}
.page-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.page-title{font-size:22px;font-weight:700;color:#f1f5f9}
.page-meta{font-size:11px;color:#475569;margin-top:2px}
.mission-progress{text-align:right}
.mission-label{font-size:11px;color:#64748b}
.mission-pct{font-size:20px;font-weight:700}
.progress-bar{height:4px;background:#1e293b;border-radius:2px;margin:12px 0 20px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s}
.page-desc{color:#94a3b8;font-size:14px;margin-bottom:24px;line-height:1.6}
.section-title{font-size:13px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.goals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.goal-card{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:14px;font-size:12px;color:#94a3b8;line-height:1.5}
.goal-label{font-size:10px;font-weight:600;color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.modules-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.module-item{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s}
.module-item:hover:not(.locked){border-color:#334155;background:#162032}
.module-item.locked{opacity:.5;cursor:not-allowed}
.module-num{width:28px;height:28px;border-radius:50%;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#64748b;flex-shrink:0}
.module-num.done{background:#064e3b;color:#10b981}
.module-num.active{background:#1e3a5f;color:#60a5fa}
.module-info{flex:1}
.module-title{font-size:14px;font-weight:500;color:#e2e8f0;margin-bottom:2px}
.module-sub{font-size:12px;color:#64748b}
.module-status{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px}
.status-done{background:#064e3b;color:#10b981}
.status-active{background:#1e3a5f;color:#60a5fa}
.status-locked{background:#1e293b;color:#475569}
.cta-btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.cta-btn:hover{transform:translateY(-1px)}
.cta-btn.done{background:#064e3b;color:#10b981;cursor:default;transform:none}
.kernel-reward{background:#0f1923;border:1px solid #1e293b;border-radius:8px;padding:16px 20px;margin-top:8px}
.kernel-reward-title{font-size:11px;color:#64748b;margin-bottom:10px}
.reward-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.reward-tag{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500}
.tag-xp{background:#1c2a1c;color:#4ade80;border:1px solid #166534}
.tag-literacy{background:#1c2538;color:#93c5fd;border:1px solid #1e3a5f}
.tag-knowledge{background:#2a1c38;color:#c4b5fd;border:1px solid #3730a3}
.tag-alignment{background:#2a1c1c;color:#fca5a5;border:1px solid #7f1d1d}
.tag-quest{background:#2a2010;color:#fcd34d;border:1px solid #78350f}
.tag-analytics{background:#1a2a2a;color:#67e8f9;border:1px solid #155e75}
.kernel-link{font-size:11px;color:#475569}
.kernel-link span{color:#60a5fa}
/* Dashboard */
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px}
.stat-card{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:18px}
.stat-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;color:#f1f5f9}
.stat-sub{font-size:12px;color:#64748b;margin-top:4px}
.missions-panel{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:20px;margin-bottom:20px}
.mission-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1e293b}
.mission-row:last-child{border-bottom:none}
.mission-row-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.mission-row-info{flex:1}
.mission-row-title{font-size:13px;font-weight:500;color:#e2e8f0}
.mission-row-sub{font-size:11px;color:#64748b}
.mission-row-pct{font-size:13px;font-weight:600}
.badge-grid{display:flex;gap:10px;flex-wrap:wrap}
.badge-item{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:10px 14px;font-size:12px;text-align:center}
.badge-icon{font-size:20px;margin-bottom:4px}
.badge-name{font-size:11px;color:#94a3b8}
/* Lesson modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:#0d1117;border:1px solid #1e293b;border-radius:12px;width:100%;max-width:700px;max-height:85vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-header{padding:20px 24px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#0d1117;z-index:10}
.modal-title{font-size:16px;font-weight:600;color:#f1f5f9}
.modal-close{background:none;border:none;color:#64748b;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px}
.modal-close:hover{background:#1e293b;color:#e2e8f0}
.modal-body{padding:24px;flex:1}
.lesson-section{margin-bottom:24px}
.lesson-section-title{font-size:12px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.lesson-section-title::after{content:'';flex:1;height:1px;background:#1e293b}
.lesson-content{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:18px;line-height:1.7;color:#94a3b8;font-size:14px}
.lesson-content h3{color:#e2e8f0;font-size:15px;margin-bottom:10px;font-weight:600}
.lesson-content p{margin-bottom:12px}
.lesson-content p:last-child{margin-bottom:0}
.lesson-content .highlight{background:#1e293b;border-left:3px solid #10b981;padding:10px 14px;border-radius:0 6px 6px 0;margin:12px 0;font-size:13px;color:#cbd5e1}
.lesson-content .example{background:#1a2535;border:1px solid #1e3a5f;border-radius:6px;padding:12px 14px;margin:12px 0;font-size:13px;color:#93c5fd}
.lesson-content .term{color:#10b981;font-weight:600}
.lesson-content ul{padding-left:18px;margin:8px 0}
.lesson-content li{margin-bottom:6px;color:#94a3b8}
.quiz-section{margin-top:8px}
.quiz-q{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:18px;margin-bottom:12px}
.quiz-q-text{font-size:14px;color:#e2e8f0;margin-bottom:14px;line-height:1.5;font-weight:500}
.quiz-option{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:6px;border:1px solid #1e293b;transition:all .15s;font-size:13px;color:#94a3b8;line-height:1.4}
.quiz-option:hover:not(.disabled){border-color:#334155;background:#162032;color:#e2e8f0}
.quiz-option.selected{border-color:#2563eb;background:#1e3a5f;color:#e2e8f0}
.quiz-option.correct{border-color:#10b981;background:#064e3b;color:#d1fae5}
.quiz-option.incorrect{border-color:#ef4444;background:#450a0a;color:#fca5a5}
.quiz-option.disabled{cursor:default}
.quiz-radio{width:16px;height:16px;border-radius:50%;border:2px solid #475569;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.quiz-radio.checked{border-color:#3b82f6;background:#3b82f6}
.quiz-radio.correct-r{border-color:#10b981;background:#10b981}
.quiz-radio.incorrect-r{border-color:#ef4444;background:#ef4444}
.quiz-feedback{font-size:12px;padding:8px 12px;border-radius:6px;margin-top:8px;line-height:1.5}
.feedback-correct{background:#064e3b;color:#6ee7b7;border:1px solid #065f46}
.feedback-incorrect{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.modal-footer{padding:16px 24px;border-top:1px solid #1e293b;display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#0d1117}
/* Growth roadmap */
.level-list{display:flex;flex-direction:column;gap:8px}
.level-item{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:16px 20px;display:flex;align-items:center;gap:14px}
.level-item.current{border-color:#d97706;background:#1c1500}
.level-item.done{border-color:#065f46;background:#021a10}
.level-dot{width:14px;height:14px;border-radius:50%;border:2px solid #334155;flex-shrink:0}
.level-dot.current-d{border-color:#d97706;background:#d97706;box-shadow:0 0 0 3px #2a1a00}
.level-dot.done-d{border-color:#10b981;background:#10b981}
.level-info{flex:1}
.level-title{font-size:14px;font-weight:600;color:#e2e8f0}
.level-sub{font-size:12px;color:#64748b}
.level-xp{font-size:13px;font-weight:600;color:#64748b}
/* AI Tutor */
.chat-container{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;max-height:400px;overflow-y:auto;padding-right:4px}
.chat-msg{max-width:85%}
.chat-msg.user{align-self:flex-end}
.chat-msg.ai{align-self:flex-start}
.chat-bubble{padding:12px 16px;border-radius:10px;font-size:14px;line-height:1.6}
.chat-bubble.user{background:#1e3a5f;color:#e2e8f0;border-radius:10px 10px 2px 10px}
.chat-bubble.ai{background:#1e293b;color:#cbd5e1;border-radius:10px 10px 10px 2px}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;background:#111827;border:1px solid #1e293b;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;resize:none}
.chat-input:focus{border-color:#334155}
.chat-send-btn{background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;font-size:14px;font-family:inherit;font-weight:600}
.chat-send-btn:hover{background:#2563eb}
.divider{height:1px;background:#1e293b;margin:20px 0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── LESSON DATA ──────────────────────────────────────────────────
const LESSONS = {
  'research-basics': [
    {
      id: 'what-is-research',
      title: '연구란 무엇인가',
      subtitle: '학술 연구의 본질과 일상적 탐구와의 차이',
      content: `
        <h3>학술 연구(Academic Research)란?</h3>
        <p>연구는 단순한 지식의 나열이 아닙니다. 그것은 하나의 <span class="term">정교한 논리 구조물</span>이며, 검증 가능한 질문에 체계적으로 답하는 과정입니다.</p>
        <div class="highlight">핵심 원리: 연구는 "왜?"와 "어떻게?"에 체계적으로 답하는 학문적 탐구 활동입니다.</div>
        <h3>일상적 탐구 vs 학술 연구</h3>
        <ul>
          <li><strong>일상적 탐구:</strong> 직관, 경험, 비공식적 관찰에 의존</li>
          <li><strong>학술 연구:</strong> 체계적 방법, 재현 가능한 절차, 동료 검토(peer review)</li>
        </ul>
        <div class="example">예시: "사람들은 AI가 만든 예술을 좋아하는 것 같다" (일상) vs "AI 창작물에 대한 대중 인식 유형을 Q방법론으로 분석한다" (학술)</div>
        <h3>논문의 8개 핵심 장</h3>
        <p>모든 학술 논문은 각 장이 독립된 역할을 수행하면서도 전체 논리 사슬을 형성합니다:</p>
        <ul>
          <li>연구배경 → <span class="term">왜?</span> (why)</li>
          <li>연구목적·문제 → <span class="term">무엇을?</span> (what)</li>
          <li>이론적 배경 → <span class="term">어떤 틀로?</span> (with what lens)</li>
          <li>문헌연구 → <span class="term">기존은 어땠나?</span> (what was done)</li>
          <li>연구방법 → <span class="term">어떻게?</span> (how)</li>
          <li>연구결과 → <span class="term">무엇이 나왔나?</span> (what was found)</li>
          <li>논의 → <span class="term">왜 그런가?</span> (why and so what)</li>
          <li>결론 → <span class="term">무엇을 남겼나?</span> (legacy)</li>
        </ul>
        <div class="highlight">핵심: 각 장의 역할이 일관성은 유지하되, 절대로 겹치면 안 됩니다.</div>
      `,
      quiz: [
        {
          q: '학술 연구와 일상적 탐구를 구분하는 가장 핵심적인 특성은 무엇인가요?',
          options: ['더 많은 시간을 투자한다', '체계적 방법과 재현 가능한 절차를 사용한다', '전문 용어를 사용한다', '대학에서 수행된다'],
          answer: 1,
          explanation: '학술 연구는 체계적 방법, 재현 가능한 절차, 동료 검토를 통해 일상적 탐구와 구분됩니다.'
        },
        {
          q: '논문에서 "왜 이 연구인가?"를 설득하는 장은 무엇인가요?',
          options: ['연구방법', '연구결과', '연구배경', '결론'],
          answer: 2,
          explanation: '연구배경은 "왜?"(why)에 답하며, 거시적 변화에서 구체적 연구 공백으로 좁혀지는 깔때기 구조를 따릅니다.'
        }
      ]
    },
    {
      id: 'research-question',
      title: '연구문제·목적·질문',
      subtitle: '세 요소의 위계와 상호 연결',
      content: `
        <h3>연구목적: 논문 전체의 나침반</h3>
        <p>연구목적은 논문 전체 설계의 나침반입니다. <span class="term">무엇을(대상), 어떤 관점으로(how), 어떤 방향으로(direction)</span> 탐구하는지를 하나의 문장에 담아야 합니다.</p>
        <div class="highlight">구조: 핵심 목적(1개) + 세부 목적(3~4개) + RQ 2~4개, 위계적 구조로 배치</div>
        <h3>연구문제(RQ): 탐구 지도</h3>
        <p>연구문제(Research Question)는 목적을 구체적·조작적 질문으로 분해한 탐구 지도입니다. 좋은 RQ는 "예/아니오"로 답하지 않으며, <span class="term">어떻게, 왜, 어떤 유형으로</span>의 형식을 갖습니다.</p>
        <div class="example">
          예시:<br/>
          핵심 목적: 본 연구는 생성형 AI 창작에 대한 대중 인식을 분석하여 그 유형과 관계 구조를 규명한다.<br/>
          RQ1(현상): 어떤 인식 유형이 있는가?<br/>
          RQ2(관계): 유형 간 관계 구조는 어떠한가?<br/>
          RQ3(의미): 이 구조의 인식론적 의미는 무엇인가?
        </div>
        <h3>연구문제와 연구목적의 차이</h3>
        <ul>
          <li><strong>연구목적:</strong> "AI 창작 인식 유형을 분석하여 해석 모델을 제시한다" (방향 선언)</li>
          <li><strong>연구문제:</strong> "어떤 인식 유형이 존재하는가?" (구체적 질문)</li>
          <li><strong>연구배경:</strong> "왜 이 연구가 필요한가?" (필요성 설득)</li>
        </ul>
        <div class="highlight">위계: 연구배경(why) → 연구목적(what) → 연구문제(how exactly)</div>
      `,
      quiz: [
        {
          q: '좋은 연구문제(RQ)의 형식으로 올바른 것은?',
          options: ['"AI가 창작에 영향을 주는가?"', '"어떤 인식 유형이 존재하는가?"', '"AI 창작은 예술이다."', '"AI 창작물이 많이 증가했다."'],
          answer: 1,
          explanation: '좋은 RQ는 "예/아니오"로 답하지 않고 "어떻게, 왜, 어떤 유형으로"의 형식을 사용합니다.'

// ─── HELPERS ──────────────────────────────────────────────────────
function getLevel(xp) {
  let lv = 0;
  for(let l of LEVELS) if(xp >= l.xp) lv = l.level;
  return lv;
}
function getProgress(menuId, kernel) {
  const lessons = LESSONS[menuId] || [];
  const done = (kernel.completedLessons[menuId] || []).length;
  return Math.round((done / Math.max(lessons.length,1)) * 100);
}
function getTotalProgress(kernel) {
  let total = 0, done = 0;
  for(const mid of MENU_ORDER) {
    const ls = LESSONS[mid] || [];
    total += ls.length;
    done += (kernel.completedLessons[mid] || []).length;
  }
  return Math.round((done/Math.max(total,1))*100);
}

// ─── QUIZ COMPONENT ───────────────────────────────────────────────
function QuizItem({ q, idx, answered, setAnswer }) {
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);

  function pick(i) {
    if(revealed) return;
    setSelected(i);
    setRevealed(true);
    if(i === q.answer) setAnswer(idx, true);
    else setAnswer(idx, false);
  }

  return (
    <div className="quiz-q">
      <div className="quiz-q-text">{idx+1}. {q.q}</div>
      {q.options.map((opt,i) => {
        let cls = 'quiz-option';
        if(revealed) cls += ' disabled';
        if(selected === i) {
          if(i === q.answer) cls += ' correct';
          else cls += ' incorrect';
        } else if(revealed && i === q.answer) cls += ' correct';
        let radioClass = 'quiz-radio';
        if(selected === i) radioClass += (i===q.answer?' correct-r':' incorrect-r');
        return (
          <div key={i} className={cls} onClick={()=>pick(i)}>
            <div className={radioClass}>{selected===i && <span style={{color:'#fff',fontSize:10}}>●</span>}</div>
            {opt}
          </div>
        );
      })}
      {revealed && (
        <div className={'quiz-feedback '+(selected===q.answer?'feedback-correct':'feedback-incorrect')}>
          {selected===q.answer ? '✓ 정답입니다! ' : '✗ 오답입니다. '}
          {q.explanation}
        </div>
      )}
    </div>
  );
}

          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="연구 개념이나 궁금한 것을 질문하세요..."
          rows={2}
        />
        <button className="chat-send-btn" onClick={send} disabled={loading}>전송</button>
      </div>

      <div className="kernel-reward" style={{marginTop:16}}>
        <div className="kernel-reward-title">이 미션 완료 시 (커널 보상)</div>
        <div className="reward-tags">
          <span className="reward-tag tag-xp">XP +{menu.xp}/레슨</span>
          <span className="reward-tag tag-literacy">{menu.litLabel} +6/레슨</span>
          <span className="reward-tag tag-analytics">Analytics: 학습 패턴 기록</span>
        </div>
        <div className="kernel-link">연결 엔진: <span>{menu.engine}</span> · 진행은 Supabase에 저장되어 대시보드(커널 도출)에 반영됩니다.</div>
      </div>

      {activeLessonIdx !== null && (
        <LessonModal
          menu={menu}
          lessonIdx={activeLessonIdx}
          onClose={()=>setActiveLessonIdx(null)}
          alreadyDone={(kernel.completedLessons[menu.id]||[]).includes(activeLessonIdx)}
          onComplete={()=>{ onLessonComplete(menu, activeLessonIdx); setActiveLessonIdx(null); }}
        />
      )}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────
function Dashboard({ kernel, onNavigate }) {
  const lv = getLevel(kernel.xp);
  const lvInfo = LEVELS[lv];
  const nextLv = LEVELS[Math.min(lv+1,9)];
  const xpToNext = nextLv.xp - kernel.xp;
  const totalProgress = getTotalProgress(kernel);

  return (
    <div className="page">
      <div style={{marginBottom:24}}>
        <div style={{fontSize:22,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Dashboard</div>
        <div style={{fontSize:13,color:'#64748b'}}>연구자 성장 5단계 — 학습으로 XP를 쌓아 Research-Ready Scholar(L5)에 도달합니다.</div>
      </div>

      <div className="dashboard-grid">
        <div className="stat-card">
          <div className="stat-label">현재 레벨</div>
          <div className="stat-value" style={{fontSize:20,color:'#f59e0b'}}>{lvInfo.title}</div>
          <div className="stat-sub">{lvInfo.eng}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">총 XP</div>
          <div className="stat-value">{kernel.xp} XP</div>
          <div className="stat-sub">다음 레벨까지 {xpToNext} XP</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">전체 진행률</div>
          <div className="stat-value">{totalProgress}%</div>
          <div className="stat-sub">연속 학습 {kernel.streakDays}일</div>
        </div>
      </div>

      <div className="missions-panel">
        <div style={{fontSize:13,fontWeight:600,color:'#94a3b8',marginBottom:12,textTransform:'uppercase',letterSpacing:'.8px'}}>미션 현황</div>
        {MENUS.filter(m=>m.id!=='dashboard'&&m.id!=='growth').map(menu=>{
          const prog = getProgress(menu.id, kernel);
          return (
            <div key={menu.id} className="mission-row" style={{cursor:'pointer'}} onClick={()=>onNavigate(menu.id)}>
              <div className="mission-row-icon" style={{background:menu.color+'22',color:menu.color}}>{menu.icon}</div>
              <div className="mission-row-info">
                <div className="mission-row-title">{menu.label}</div>
                <div className="mission-row-sub">{menu.category||menu.engine||''}</div>
              </div>
              <div className="mission-row-pct" style={{color:prog===100?'#10b981':prog>0?'#60a5fa':'#64748b'}}>
                {prog}%
              </div>
            </div>
          );
        })}
      </div>

      <div style={{fontSize:13,fontWeight:600,color:'#94a3b8',marginBottom:12,textTransform:'uppercase',letterSpacing:'.8px'}}>역량 리터러시</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:24}}>
        {Object.entries(kernel.literacy).map(([k,v])=>(
          <div key={k} style={{background:'#111827',border:'1px solid #1e293b',borderRadius:8,padding:'12px 14px'}}>
            <div style={{fontSize:11,color:'#64748b',marginBottom:6}}>{k}</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{flex:1,height:4,background:'#1e293b',borderRadius:2,overflow:'hidden'}}>
                <div style={{height:'100%',background:'#3b82f6',borderRadius:2,width:Math.min(v,100)+'%'}}/>
              </div>
              <span style={{fontSize:12,fontWeight:600,color:'#93c5fd'}}>{v}</span>
            </div>
          </div>
        ))}
      </div>

      <div style={{fontSize:13,fontWeight:600,color:'#94a3b8',marginBottom:12,textTransform:'uppercase',letterSpacing:'.8px'}}>배지</div>
      <div className="badge-grid">
        {kernel.badges.map((b,i)=>(
          <div key={i} className="badge-item">
            <div className="badge-icon">{b.split(' ')[0]}</div>
            <div className="badge-name">{b.replace(/^[^\s]+\s/,'')}</div>
          </div>
        ))}
        {kernel.badges.length===0 && <div style={{fontSize:12,color:'#475569'}}>아직 배지가 없습니다. 미션을 완료하세요!</div>}
      </div>
    </div>
  );
}

// ─── GROWTH ROADMAP ───────────────────────────────────────────────
function GrowthRoadmap({ kernel, onBack }) {
  const lv = getLevel(kernel.xp);
  return (
    <div className="page">
      <div style={{marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>성장 로드맵</div>
        <div style={{fontSize:13,color:'#64748b'}}>연구자 성장 5단계 — 학습으로 XP를 쌓아 Research-Ready Scholar(L5)에 도달합니다. (현재 {kernel.xp} XP)</div>
      </div>
      <div className="level-list">
        {LEVELS.map(l=>{
          const isDone = lv > l.level;
          const isCurrent = lv === l.level;
          return (
            <div key={l.level} className={'level-item'+(isCurrent?' current':isDone?' done':'')}>
              <div className={'level-dot'+(isCurrent?' current-d':isDone?' done-d':'')}/>
              <div className="level-info">
                <div className="level-title">{l.title} {isCurrent&&<span style={{fontSize:11,color:'#d97706',marginLeft:6}}>현재</span>}</div>
                <div className="level-sub">{l.eng}</div>
              </div>
              <div className="level-xp">{l.xp} XP</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── NOTIFICATION TOAST ───────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(()=>{
    const t = setTimeout(onDone, 3000);
    return ()=>clearTimeout(t);
  },[]);
  return (
    <div style={{position:'fixed',bottom:24,right:24,background:'#064e3b',border:'1px solid #065f46',borderRadius:10,padding:'14px 20px',zIndex:200,color:'#6ee7b7',fontSize:13,boxShadow:'0 4px 24px rgba(0,0,0,.5)',maxWidth:320}}>
      {msg}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────
function App() {
  const [currentMenu, setCurrentMenu] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const [kernel, setKernel] = useState(()=>{
    try {
      const saved = localStorage.getItem('rdos-kernel-v4');
      return saved ? JSON.parse(saved) : defaultKernel();
    } catch { return defaultKernel(); }
  });

  useEffect(()=>{
    localStorage.setItem('rdos-kernel-v4', JSON.stringify(kernel));
  },[kernel]);

  function showToast(msg) {
    setToast(msg);
  }

  function handleLessonComplete(menu, lessonIdx) {
    setKernel(prev=>{
      const done = prev.completedLessons[menu.id] || [];
      if(done.includes(lessonIdx)) return prev;
      const newDone = [...done, lessonIdx];
      const newXp = prev.xp + menu.xp;
      const newLit = {...prev.literacy, [menu.literacy]: (prev.literacy[menu.literacy]||0)+6};
      let newBadges = [...prev.badges];

      // Badge logic
      if(newDone.length === (LESSONS[menu.id]||[]).length) {
        const badge = '🏆 ' + menu.label + ' 완료';
        if(!newBadges.includes(badge)) newBadges.push(badge);
      }
      const prevLv = getLevel(prev.xp);
      const newLv = getLevel(newXp);
      if(newLv > prevLv) {
        const lvBadge = '⭐ '+LEVELS[newLv].title+' 달성';
        if(!newBadges.includes(lvBadge)) newBadges.push(lvBadge);
      }

      showToast(`✓ 레슨 완료! XP +${menu.xp} · ${menu.litLabel} +6`);

      return {
        ...prev,
        xp: newXp,
        completedLessons: {...prev.completedLessons, [menu.id]: newDone},
        literacy: newLit,
        badges: newBadges,
      };
    });
  }

  const activeMenu = MENUS.find(m=>m.id===currentMenu);

  function renderContent() {
    if(currentMenu === 'dashboard') return <Dashboard kernel={kernel} onNavigate={id=>setCurrentMenu(id)}/>;
    if(currentMenu === 'growth') return <GrowthRoadmap kernel={kernel} onBack={()=>setCurrentMenu('dashboard')}/>;
    if(!activeMenu) return null;
    if(currentMenu === 'ai-tutor') {
      return <AiTutorPage menu={activeMenu} kernel={kernel} onBack={()=>setCurrentMenu('dashboard')} onLessonComplete={handleLessonComplete}/>;
    }
    return <MenuPage menu={activeMenu} kernel={kernel} onBack={()=>setCurrentMenu('dashboard')} onLessonComplete={handleLessonComplete}/>;
  }

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <div style={{width:26,height:26,background:'linear-gradient(135deg,#4f46e5,#7c3aed)',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff'}}>R</div>
            <div className="sidebar-logo-title">RDOS</div>
          </div>
          <div className="sidebar-logo-sub">연구준비자</div>
        </div>
        {MENUS.map(m=>(
          <div
            key={m.id}
            className={'sidebar-item'+(currentMenu===m.id?' active':'')}
            onClick={()=>setCurrentMenu(m.id)}
          >
            <div className="sidebar-icon" style={{background:m.color+'22',color:m.color}}>{m.icon}</div>
            <span style={{fontSize:12}}>{m.label}</span>
          </div>
        ))}
      </div>
      <div className="main">
        {renderContent()}
      </div>
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
